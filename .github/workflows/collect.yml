name: Collect team count snapshot

on:
  schedule:
    # every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect-snapshot
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and record snapshot
        env:
          # Supplied from repo Settings -> Secrets and variables -> Actions.
          # These stay on GitHub's runner: the collector writes only aggregate
          # counts into data/*.json, so the credentials never reach the
          # published site or a visitor's browser.
          # If unset, the collector falls back to the Wix counts endpoint.
          WEBSCORER_API_ID: ${{ secrets.WEBSCORER_API_ID }}
          WEBSCORER_API_TOKEN: ${{ secrets.WEBSCORER_API_TOKEN }}
        run: python3 scripts/collect_snapshot.py

      - name: Commit updated data
        run: |
          git config user.name "yamathon-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest.json data/history.csv data/feed.json data/daily.json data/weekly.json data/roster.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update team counts $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # If anything landed on main since checkout, a plain push is
          # rejected and the whole run fails. Rebase onto whatever is there
          # and retry - the data files are only ever written by this job, so
          # a rebase can't conflict with human edits to code.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) - rebasing onto latest main."
            git pull --rebase --autostash origin main || {
              echo "::error::Rebase failed; leaving main untouched."
              exit 1
            }
          done
          echo "::error::Could not push after 3 attempts."
          exit 1
