name: Collect team count snapshot

on:
  schedule:
    # every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect-snapshot
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and record snapshot
        env:
          # Supplied from repo Settings -> Secrets and variables -> Actions.
          # These stay on GitHub's runner: the collector writes only aggregate
          # counts into data/*.json, so the credentials never reach the
          # published site or a visitor's browser.
          # If unset, the collector falls back to the Wix counts endpoint.
          WEBSCORER_API_ID: ${{ secrets.WEBSCORER_API_ID }}
          WEBSCORER_API_TOKEN: ${{ secrets.WEBSCORER_API_TOKEN }}
        run: python3 scripts/collect_snapshot.py

      - name: Commit updated data
        run: |
          git config user.name "yamathon-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest.json data/history.csv data/feed.json data/daily.json data/weekly.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update team counts $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
