name: Daily registration report

on:
  # NO `schedule:` TRIGGER HERE - THIS IS DELIBERATE.
  #
  # GitHub throttles scheduled workflows hard on free public repos. This
  # workflow's cron was nominally 00:05 JST; in practice it fired at 03:12
  # one day, skipped the next entirely, then turned up at 05:14 - hours
  # after the external scheduler had already delivered, producing a
  # duplicate email. A briefing that arrives at an unpredictable hour is
  # not a daily briefing.
  #
  # Delivery is now driven by an external scheduler (cron-job.org) posting
  # a repository_dispatch of type `daily-report` at 00:05 Asia/Tokyo. See
  # SETUP.md for the token scope and job configuration.
  #
  # If that scheduler is ever retired, either restore a `schedule:` block
  # here and accept the timing drift, or point a replacement scheduler at
  # the same dispatch endpoint.
  repository_dispatch:
    types: [daily-report]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send daily report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: allivg@ivgjapan.org
        run: python3 scripts/send_daily_report.py
